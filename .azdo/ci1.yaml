name: igloo-PR-$(Date:yyyyMMdd)$(Rev:.r)


trigger:
  - main

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - igloo.slnx
      - azure-pipelines.yml

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  solution: 'igloo.slnx'

# no stages
# no jobs


steps:
  - task: UseDotNet@2
    displayName: 'Install .NET 10 SDK'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
      includePreviewVersions: false

  - script: dotnet --info
    displayName: 'Show .NET info'

  - script: tree
    displayName: 'where am I'

  - task: DotNetCoreCLI@2
    displayName: 'Restore'
    inputs:
      command: 'restore'
      projects: '$(solution)'

  - task: DotNetCoreCLI@2
    displayName: 'Build'
    inputs:
      command: 'build'
      projects: '$(solution)'
      arguments: '--configuration $(buildConfiguration) --no-restore'

  - task: DotNetCoreCLI@2
    displayName: 'Test'
    inputs:
      command: 'test'
      projects: 'src/web.tests/web.tests.csproj'
      arguments: '--configuration $(buildConfiguration) --no-build --logger trx --collect:"XPlat Code Coverage"'
      publishTestResults: true

  - task: DotNetCoreCLI@2
    displayName: 'Publish web app'
    inputs:
      command: 'publish'
      publishWebProjects: false
      projects: 'src/web/web.csproj'
      arguments: '--configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/web'
      zipAfterPublish: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish artifact: web'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/web'
      ArtifactName: 'web'